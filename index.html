<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#e63946">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Dikkie's pizza dough calculator</title>

<!-- Pizza Emoji Icon -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍕</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍕</text></svg>">

<!-- Link to external CSS -->
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Dikkie's pizza dough calculator</h1>
  
  <div class="form-group">
    <div class="hydration-header">
      <label for="hydrationSlider" style="margin-bottom: 0;">Hydration level</label>
      <span id="hydrationVal">67%</span>
    </div>
    <input type="range" id="hydrationSlider" min="55" max="70" value="67" step="1" oninput="updateHydration()">
    <div id="hydrationHelp" class="help-text"></div>
  </div>

  <div class="form-group">
    <label for="numPizzas">Quantity of pizzas</label>
    <div class="quantity-wrapper">
      <button type="button" class="qty-btn" onclick="adjustQty(-1)">-</button>
      <input type="number" id="numPizzas" placeholder="How many?" min="1" oninput="calculate()">
      <button type="button" class="qty-btn" onclick="adjustQty(1)">+</button>
    </div>
  </div>

  <!-- Settings toggles -->
  <div class="settings-group">
    <div class="toggle-container">
      <label for="darkModeToggle">Dark mode</label>
      <label class="switch">
        <input type="checkbox" id="darkModeToggle" onchange="toggleDarkMode()">
        <span class="slider"></span>
      </label>
    </div>

    <div class="toggle-container">
      <label for="wakeLockToggle">Keep screen on</label>
      <label class="switch">
        <input type="checkbox" id="wakeLockToggle" onchange="toggleWakeLock()">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div id="results">
    <!-- JavaScript will populate this section -->
  </div>
</div>

<!-- Link to external JS -->
<script src="script.js"></script>
</body>
</html>
